events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    log_format json_combined escape=json
      '{"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"correlation_id":"$http_x_correlation_id"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;

        # Health check for the Gateway itself
        location = /health {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 200 '{"status":"ok","service":"api-gateway"}';
        }

        # --- Microservices Health Checks ---
        location = /api/v1/users/health {
            proxy_pass http://users:8000/health;
        }

        location = /api/v1/restaurants/health {
            proxy_pass http://restaurants:8000/health;
        }

        location = /api/v1/orders/health {
            proxy_pass http://orders:8000/health;
        }

        location = /api/v1/payments/health {
            proxy_pass http://payments:8000/health;
        }

        location = /api/v1/deliveries/health {
            proxy_pass http://deliveries:8000/health;
        }

        location = /api/v1/notifications/health {
            proxy_pass http://notifications:8000/health;
        }

        # --- Microservices API Routes ---
        location /api/v1/auth {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Correlation-Id';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Correlation-Id' always;

            proxy_pass http://users:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
        }

        location /api/v1/users {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
